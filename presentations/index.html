<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public AI Switzerland — Presentations</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/white.css" id="theme">
  <style>
    :root {
      --primary: #ff5733;
      --border: #e2e2e2;
      --bg: #f8f9fa;
      --text: #1a1a1a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .topbar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }
    .topbar h1 {
      font-size: 1rem;
      margin: 0;
      white-space: nowrap;
    }
    .topbar img {
      height: 24px;
      width: auto;
    }
    .controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    select, a.button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 0.45rem 0.65rem;
      font-size: 0.9rem;
      color: var(--text);
      text-decoration: none;
    }
    a.button:hover {
      border-color: var(--primary);
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      padding: 0.75rem;
      height: calc(100vh - 64px);
    }
    .panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      min-height: 0;
    }
    .panel-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: #fff;
      color: #555;
    }
    .slide-host {
      height: calc(100% - 37px);
      background: #111;
      position: relative;
    }
    .slide-toolbar {
      position: absolute;
      top: 0.6rem;
      left: 0.6rem;
      z-index: 30;
    }
    .slide-mode-btn {
      border: 1px solid #cfcfcf;
      background: rgba(255, 255, 255, 0.92);
      color: #1a1a1a;
      border-radius: 8px;
      padding: 0.35rem 0.55rem;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }
    .slide-mode-btn:hover {
      border-color: var(--primary);
    }
    .slide-brand {
      position: absolute;
      top: 0.7rem;
      right: 0.75rem;
      height: 24px;
      width: auto;
      z-index: 28;
      opacity: 0.95;
      pointer-events: none;
    }
    .reveal {
      height: 100%;
    }
    .reveal .slides section {
      text-align: left;
      font-size: 0.9em;
      line-height: 1.35;
    }
    .reveal .slides h1,
    .reveal .slides h2,
    .reveal .slides h3 {
      text-align: left;
      color: #1a1a1a;
      margin-bottom: 0.5em;
      text-transform: none;
      letter-spacing: normal;
    }
    .reveal .slides ul,
    .reveal .slides ol {
      display: block;
      margin-left: 1.2em;
    }
    .md-pane {
      height: calc(100% - 37px);
      overflow: auto;
      margin: 0;
      padding: 1rem;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9rem;
      line-height: 1.45;
    }
    .error {
      color: #b00020;
      padding: 0.75rem;
      margin: 0;
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      background: #fff5f5;
      display: none;
    }
    body.presentation-mode .topbar {
      display: none;
    }
    body.presentation-mode .layout {
      grid-template-columns: 1fr;
      padding: 0;
      gap: 0;
      height: 100vh;
    }
    body.presentation-mode .panel {
      border: 0;
      border-radius: 0;
      height: 100vh;
    }
    body.presentation-mode .panel-title {
      display: none;
    }
    body.presentation-mode .panel:last-child {
      display: none;
    }
    body.presentation-mode .slide-host {
      height: 100vh;
    }
    body.presentation-mode .slide-brand {
      top: 0.9rem;
      right: 1rem;
      height: 28px;
    }
    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      .panel {
        height: 60vh;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <img src="../assets/public-ai-logo.png" alt="Public AI logo">
      <h1>Presentations</h1>
    </div>
    <div class="controls">
      <label for="deckSelect">Deck</label>
      <select id="deckSelect" aria-label="Select presentation"></select>
      <a class="button" href="../internal.html">Back to internal</a>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-title">Slides</div>
      <div class="slide-host">
        <div class="slide-toolbar">
          <button id="presentationModeBtn" class="slide-mode-btn" type="button">
            Presentation mode
          </button>
        </div>
        <img
          src="../assets/public-ai-logo.png"
          alt="Public AI"
          class="slide-brand"
        >
        <div class="reveal">
          <div class="slides" id="slidesRoot"></div>
        </div>
      </div>
      <p class="error" id="slidesError"></p>
    </section>

    <section class="panel">
      <div class="panel-title">Markdown source</div>
      <pre class="md-pane" id="markdownPane"></pre>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
  <script>
    const deckSelect = document.getElementById("deckSelect");
    const slidesRoot = document.getElementById("slidesRoot");
    const markdownPane = document.getElementById("markdownPane");
    const slidesError = document.getElementById("slidesError");
    const presentationModeBtn = document.getElementById("presentationModeBtn");
    let revealDeck = null;

    function showError(message) {
      slidesError.textContent = message;
      slidesError.style.display = "block";
    }

    function clearError() {
      slidesError.style.display = "none";
      slidesError.textContent = "";
    }

    function splitSlides(markdown) {
      return markdown
        .split(/\n---\n/g)
        .map((chunk) => chunk.trim())
        .filter(Boolean);
    }

    function renderSlides(markdown) {
      const chunks = splitSlides(markdown);
      slidesRoot.innerHTML = "";
      chunks.forEach((chunk) => {
        const section = document.createElement("section");
        section.setAttribute("data-markdown", "");
        const textarea = document.createElement("textarea");
        textarea.setAttribute("data-template", "");
        textarea.textContent = chunk;
        section.appendChild(textarea);
        slidesRoot.appendChild(section);
      });
    }

    function titleFromFilename(filename) {
      return filename
        .replace(/\.md$/i, "")
        .split(/[-_]/g)
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }

    function normalizeDecks(decks) {
      return decks
        .filter((deck) => typeof deck.path === "string" && deck.path.endsWith(".md"))
        .map((deck) => {
          const path = deck.path.startsWith("./") ? deck.path : `./${deck.path}`;
          const filename = path.split("/").pop();
          return {
            id: deck.id || filename.replace(/\.md$/i, ""),
            title: deck.title || titleFromFilename(filename),
            path
          };
        });
    }

    function uniqueDecks(decks) {
      const seen = new Set();
      return decks.filter((deck) => {
        const key = `${deck.id}::${deck.path}`;
        if (seen.has(key)) {
          return false;
        }
        seen.add(key);
        return true;
      });
    }

    function detectGitHubRepoContext() {
      const host = window.location.hostname;
      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const url = new URL(window.location.href);
      const ref = url.searchParams.get("ref") || "main";

      if (!host.endsWith(".github.io")) {
        return null;
      }
      if (!pathParts.length) {
        return null;
      }

      const owner = host.replace(".github.io", "");
      const repo = pathParts[0];
      return { owner, repo, ref };
    }

    async function loadDecksFromGithubApi(repoContext) {
      if (!repoContext) {
        throw new Error("Not running on GitHub Pages.");
      }
      const response = await fetch(
        `https://api.github.com/repos/${repoContext.owner}/${repoContext.repo}/contents/presentations?ref=${repoContext.ref}`
      );
      if (!response.ok) {
        throw new Error("Could not discover deck files via GitHub API.");
      }
      const files = await response.json();
      const decks = files
        .filter((file) => file.type === "file" && /\.md$/i.test(file.name))
        .map((file) => ({
          id: file.name.replace(/\.md$/i, ""),
          title: titleFromFilename(file.name),
          path: `./${file.name}`
        }))
        .sort((a, b) => a.title.localeCompare(b.title));
      if (!decks.length) {
        throw new Error("No markdown decks found in /presentations.");
      }
      return decks;
    }

    async function loadDecksFromManifest() {
      const response = await fetch("./manifest.json");
      if (!response.ok) {
        throw new Error("Could not load presentations manifest.");
      }
      const data = await response.json();
      const decks = normalizeDecks(data.decks || []);
      if (!decks.length) {
        throw new Error("No decks found in manifest.");
      }
      return decks;
    }

    async function discoverDecks() {
      const repoContext = detectGitHubRepoContext();
      const sources = await Promise.allSettled([
        loadDecksFromManifest(),
        loadDecksFromGithubApi(repoContext)
      ]);

      const manifestDecks = sources[0].status === "fulfilled"
        ? sources[0].value
        : [];
      const githubDecks = sources[1].status === "fulfilled"
        ? sources[1].value
        : [];

      const merged = uniqueDecks([...githubDecks, ...manifestDecks]).sort(
        (a, b) => a.title.localeCompare(b.title)
      );
      if (!merged.length) {
        throw new Error("No decks found from manifest or repository scan.");
      }
      return merged;
    }

    async function filterExistingDecks(decks) {
      const checks = await Promise.all(
        decks.map(async (deck) => {
          try {
            const response = await fetch(deck.path, { cache: "no-store" });
            return response.ok ? deck : null;
          } catch (error) {
            return null;
          }
        })
      );
      return checks.filter(Boolean);
    }

    async function loadDeckContent(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error("Could not load deck markdown file.");
      }
      return response.text();
    }

    function setQueryDeck(deckId) {
      const url = new URL(window.location.href);
      url.searchParams.set("deck", deckId);
      history.replaceState({}, "", url);
    }

    function getQueryDeck() {
      const url = new URL(window.location.href);
      return url.searchParams.get("deck");
    }

    async function mountDeckFromId(decks, deckId) {
      clearError();
      const chosen = decks.find((d) => d.id === deckId) || decks[0];
      if (!chosen) {
        showError("No presentation decks are available.");
        return;
      }
      deckSelect.value = chosen.id;
      setQueryDeck(chosen.id);

      let markdown = "";
      try {
        markdown = await loadDeckContent(chosen.path);
      } catch (error) {
        const remainingDecks = decks.filter((deck) => deck.id !== chosen.id);
        if (!remainingDecks.length) {
          showError("No readable markdown deck files were found.");
          return;
        }
        showError(`Skipping missing deck: ${chosen.path}`);
        await mountDeckFromId(remainingDecks, remainingDecks[0].id);
        return;
      }
      markdownPane.textContent = markdown;
      renderSlides(markdown);

      if (revealDeck) {
        revealDeck.destroy();
      }
      revealDeck = new Reveal({
        embedded: true,
        hash: false,
        controls: true,
        progress: true,
        center: true,
        plugins: [RevealMarkdown]
      });
      await revealDeck.initialize();
    }

    async function init() {
      try {
        const discoveredDecks = await discoverDecks();
        const decks = await filterExistingDecks(discoveredDecks);
        if (!decks.length) {
          throw new Error("No markdown files found in /presentations.");
        }
        decks.forEach((deck) => {
          const opt = document.createElement("option");
          opt.value = deck.id;
          opt.textContent = deck.title;
          deckSelect.appendChild(opt);
        });
        const requested = getQueryDeck();
        const initial = decks.some((d) => d.id === requested)
          ? requested
          : decks[0]?.id;
        await mountDeckFromId(decks, initial);
        deckSelect.addEventListener("change", async (event) => {
          try {
            await mountDeckFromId(decks, event.target.value);
          } catch (error) {
            showError(error.message);
          }
        });
      } catch (error) {
        showError(error.message);
      }
    }

    presentationModeBtn.addEventListener("click", () => {
      const isEnabled = document.body.classList.toggle("presentation-mode");
      presentationModeBtn.textContent = isEnabled
        ? "Exit presentation mode"
        : "Presentation mode";
      if (revealDeck) {
        setTimeout(() => revealDeck.layout(), 100);
      }
    });

    init();
  </script>
</body>
</html>
